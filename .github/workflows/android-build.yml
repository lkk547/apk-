name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Install Cython and Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3" buildozer

      - name: Clean Buildozer cache
        run: rm -rf ~/.buildozer

      - name: Fix buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          if grep -q "^p4a.branch" buildozer.spec; then
            sed -i 's/^p4a.branch.*/p4a.branch = master/' buildozer.spec
          else
            echo "p4a.branch = master" >> buildozer.spec
          fi

          if grep -q "^android.ndk" buildozer.spec; then
            sed -i 's/^android.ndk.*/# android.ndk = (managed by CI)/' buildozer.spec
          fi

          if grep -q "^android.api" buildozer.spec; then
            sed -i 's/^android.api.*/android.api = 33/' buildozer.spec
          else
            echo "android.api = 33" >> buildozer.spec
          fi

          if grep -q "^android.build_tools_version" buildozer.spec; then
            sed -i 's/^android.build_tools_version.*/android.build_tools_version = 34.0.0/' buildozer.spec
          else
            echo "android.build_tools_version = 34.0.0" >> buildozer.spec
          fi

      - name: Install Android SDK components
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: |
          set -euxo pipefail

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ ! -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

          test -x "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" --version || true

      - name: Verify aidl and make available
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        run: |
          set -euxo pipefail
          echo "Contents of build-tools:"
          ls -la "$ANDROID_SDK_ROOT/build-tools" || true
          ls -la "$ANDROID_SDK_ROOT/build-tools/34.0.0" || true
          if [ -x "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" ]; then
            echo 'aidl present'
          else
            echo 'aidl not found under build-tools/34.0.0'
          fi
          echo "PATH="$PATH
          # ensure aidl is on PATH for buildozer
          sudo ln -sf "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" /usr/local/bin/aidl || true
          which aidl || true

      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          ANDROID_NDK_HOME: ${{ github.workspace }}/android-sdk/ndk/25.2.9519653
          ANDROID_NDK_ROOT: ${{ github.workspace }}/android-sdk/ndk/25.2.9519653
        run: |
          set -euxo pipefail
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock_simulator_apk
          path: bin/*.apk
          if-no-files-found: error
